name: CI

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  ZIG_GLOBAL_CACHE_DIR: .zig-cache/global
  ZIG_LOCAL_CACHE_DIR: .zig-cache/local

jobs:
  source-checks:
    name: Source checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - uses: actions/cache@v4
        with:
          path: .zig-cache
          key: zig-source-${{ runner.os }}-${{ runner.arch }}-0.16.0-${{ hashFiles('build.zig', 'build.zig.zon') }}
          restore-keys: |
            zig-source-${{ runner.os }}-${{ runner.arch }}-0.16.0-

      - name: Check formatting
        run: zig fmt --check build.zig build.zig.zon src test bench examples tools

      - name: Check Python tools compile
        run: env PYTHONDONTWRITEBYTECODE=1 python3 -m py_compile bench/tools/*.py tools/*.py

      - name: Check package paths
        run: python3 tools/check_package_paths.py --archive zig-out/ci/zynum-source.tar.gz

      - name: Regenerate compatibility headers
        run: zig build generate-headers --summary failures

      - name: Check generated headers are up to date
        run: |
          if [ -n "$(git status --porcelain -- include/zynum/blas)" ]; then
            echo "Generated compatibility headers are out of date. Run 'zig build generate-headers' and commit the result."
            git --no-pager diff -- include/zynum/blas
            git --no-pager status --short -- include/zynum/blas
            exit 1
          fi

  target-tests:
    name: ${{ matrix.name }}
    needs: source-checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS / aarch64 baseline
            os: macos-15
            cache_target: macos-aarch64-baseline
            target_args: -Dtarget=aarch64-macos -Dcpu=baseline
            host_tool_smoke: true
            install: true
            dynlib: zig-out/lib/libzynum_blas.dylib
            full_smoke: false
          - name: Linux / x86_64 baseline
            os: ubuntu-24.04
            cache_target: linux-x86_64-baseline
            target_args: -Dtarget=x86_64-linux-gnu -Dcpu=baseline
            host_tool_smoke: true
            install: true
            dynlib: zig-out/lib/libzynum_blas.so
            full_smoke: true
          - name: Linux / ARM64 baseline
            os: ubuntu-24.04-arm
            cache_target: linux-arm64-baseline
            target_args: -Dtarget=aarch64-linux-gnu -Dcpu=baseline
            host_tool_smoke: true
            install: true
            dynlib: zig-out/lib/libzynum_blas.so
            full_smoke: false
          - name: Windows / x86_64 baseline
            os: windows-2025
            cache_target: windows-x86_64-baseline
            target_args: -Dtarget=x86_64-windows-gnu -Dcpu=baseline
            host_tool_smoke: false
            install: false
            dynlib: ""
            full_smoke: false
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - uses: actions/cache@v4
        with:
          path: .zig-cache
          key: zig-test-${{ runner.os }}-${{ runner.arch }}-0.16.0-${{ matrix.cache_target }}-${{ hashFiles('build.zig', 'build.zig.zon') }}
          restore-keys: |
            zig-test-${{ runner.os }}-${{ runner.arch }}-0.16.0-${{ matrix.cache_target }}-
            zig-test-${{ runner.os }}-${{ runner.arch }}-0.16.0-

      - name: Install Fortran compiler on Ubuntu
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran

      - name: Test Debug target
        run: zig build test ${{ matrix.target_args }} -Dhost-tool-smoke=${{ matrix.host_tool_smoke }} --summary failures

      - name: Test ReleaseSafe target
        run: zig build --release=safe test ${{ matrix.target_args }} -Dhost-tool-smoke=${{ matrix.host_tool_smoke }} --summary failures

      - name: Test ReleaseFast target
        run: zig build --release=fast test ${{ matrix.target_args }} -Dhost-tool-smoke=${{ matrix.host_tool_smoke }} --summary failures

      - name: Build install artifacts
        if: matrix.install
        run: zig build ${{ matrix.target_args }} --release=fast --summary failures

      - name: Check ABI symbols
        if: matrix.install
        run: |
          python3 tools/check_abi_manifest.py \
            --manifest include/zynum/blas/abi_manifest.json \
            --dynamic "${{ matrix.dynlib }}" \
            --static zig-out/lib/libzynum_blas.a

      - name: Check install metadata
        if: matrix.install
        run: |
          python3 - <<'PY'
          from pathlib import Path
          pc = Path("zig-out/lib/pkgconfig/zynum_blas.pc")
          text = pc.read_text()
          assert "Name: zynum_blas" in text
          assert "-lzynum_blas" in text
          assert "Cflags:" in text
          PY
          if command -v pkg-config >/dev/null 2>&1; then
            PKG_CONFIG_PATH=zig-out/lib/pkgconfig pkg-config --exists zynum_blas
            PKG_CONFIG_PATH=zig-out/lib/pkgconfig pkg-config --cflags --libs zynum_blas
          fi

      - name: Run Zig example
        if: matrix.full_smoke
        run: zig build --build-file examples/zig/build.zig run

      - name: Run CBLAS example
        if: matrix.full_smoke
        run: |
          mkdir -p zig-out/examples
          cc -std=c11 examples/cblas/dgemm.c \
            -I zig-out/include -L zig-out/lib -lzynum_blas \
            -Wl,-rpath,zig-out/lib \
            -o zig-out/examples/cblas-dgemm
          zig-out/examples/cblas-dgemm

      - name: Run Fortran example
        if: matrix.full_smoke && runner.os == 'Linux'
        run: |
          mkdir -p zig-out/examples/fortran-mod
          gfortran -std=f2008 -J zig-out/examples/fortran-mod \
            -c zig-out/include/zynum/blas/blas.f90 \
            -o zig-out/examples/zynum_blas_fortran.o
          gfortran -std=f2008 -I zig-out/examples/fortran-mod \
            examples/fortran/dgemm.f90 zig-out/examples/zynum_blas_fortran.o \
            -L zig-out/lib -lzynum_blas -Wl,-rpath,zig-out/lib \
            -o zig-out/examples/fortran-dgemm
          zig-out/examples/fortran-dgemm

      - name: Run benchmark executable smoke tests
        if: matrix.full_smoke
        run: |
          zig build bench -Dbench-accelerate=none -Dbench-openblas=none --release=fast -- --size 2 --reps 1
          zig build bench-gemm-sweep -Dbench-accelerate=none -Dbench-openblas=none --release=fast -- --kind dgemm --shape tiny:2:2:2 --reps 1
          zig build bench-vector-matrix-sweep -Dbench-accelerate=none -Dbench-openblas=none --release=fast -- --size 4 --reps 1 --case dcopy

      - name: Run probe smoke tests
        if: matrix.full_smoke
        run: |
          zig-out/bin/level1-probe --lib "${{ matrix.dynlib }}" --op ddot --n 4 --seconds 0
          zig-out/bin/dcopy-probe --lib "${{ matrix.dynlib }}" --kind d --n 4 --seconds 0

      - name: Run Python benchmark tool smoke tests
        if: matrix.full_smoke
        run: |
          mkdir -p zig-out/ci
          python3 - <<'PY'
          from pathlib import Path
          Path("zig-out/ci/gemm_fixture.csv").write_text(
              "kind,shape_index,label,m,n,k,library,gflops,best_ns,median_ns,p95_ns,max_ns,reps,process_repeats,check\n"
              "dgemm,0,tiny,2,2,2,zynum-blas,1.0,1,1,1,1,1,1,checked-ok\n"
              "dgemm,0,tiny,2,2,2,OpenBLAS,0.5,2,2,2,2,1,1,checked-ok\n"
          )
          Path("zig-out/ci/level1_fixture.csv").write_text(
              "group,op,library,metric,n,seconds,status,bandwidth_gbps,rate_gops\n"
              "real_f64,ddot,Zynum,gops,4,1,ok,,1.0\n"
              "real_f64,ddot,OpenBLAS,gops,4,1,ok,,0.5\n"
          )
          Path("zig-out/ci/level2_fixture.csv").write_text(
              "case,kind,library,n,status,rate_gops\n"
              "dgemv_n,real_f64,Zynum,4,ok,1.0\n"
              "dgemv_n,real_f64,OpenBLAS,4,ok,0.5\n"
          )
          PY
          python3 bench/tools/check_gemm_sweep.py zig-out/ci/gemm_fixture.csv --comparator OpenBLAS
          python3 bench/tools/plot_gemm_sweep.py zig-out/ci/gemm_fixture.csv zig-out/ci/gemm_fixture.svg
          python3 bench/tools/plot_level1_report.py zig-out/ci/level1_fixture.csv --bars-svg zig-out/ci/level1_bars.svg --ratio-svg zig-out/ci/level1_ratio.svg
          python3 bench/tools/plot_level2_report.py zig-out/ci/level2_fixture.csv --bars-svg zig-out/ci/level2_bars.svg

  feature-compile:
    name: ${{ matrix.name }}
    needs: source-checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS / Apple M4 SME2.1 compile
            os: macos-15
            cache_target: macos-apple-m4-sme2p1
            command: zig build -Dtarget=aarch64-macos -Dcpu=apple_m4+sme+sme2+sme2p1 --release=fast --summary failures
          - name: Linux / x86_64 v3 compile
            os: ubuntu-24.04
            cache_target: linux-x86_64-v3
            command: zig build -Dtarget=x86_64-linux-gnu -Dcpu=x86_64_v3 --release=fast --summary failures
          - name: Linux / x86_64 v4 compile
            os: ubuntu-24.04
            cache_target: linux-x86_64-v4
            command: zig build -Dtarget=x86_64-linux-gnu -Dcpu=x86_64_v4 --release=fast --summary failures
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - uses: actions/cache@v4
        with:
          path: .zig-cache
          key: zig-compile-${{ runner.os }}-${{ runner.arch }}-0.16.0-${{ matrix.cache_target }}-${{ hashFiles('build.zig', 'build.zig.zon') }}
          restore-keys: |
            zig-compile-${{ runner.os }}-${{ runner.arch }}-0.16.0-${{ matrix.cache_target }}-
            zig-compile-${{ runner.os }}-${{ runner.arch }}-0.16.0-

      - name: Build target
        run: ${{ matrix.command }}
